# Project conventions observed by VENOM
# HUB-MCRM architectural patterns and conventions.

conventions:
  commit_style:
    format: "type(scope): description"
    types: "feat, fix, refactor, style, docs, test, chore"
    case: "Lowercase. No period."
    examples:
      - "feat(bosta-search): add draft ticket card"
      - "fix(bosta-search): fix JSX syntax error"
      - "refactor(frontend): improve service management UI"
      
  language:
    ui: "Arabic everywhere. dir='rtl' on all pages."
    code: "English (variables, functions, comments can mix Arabic for UI context)"
    technical_terms: "English only"
    fonts: "Cairo (headings), Tajawal (body)"
    
  backend:
    error_handling: "from app.utils.responses import success_response, error_response"
    db_access: "Never raw SQL in API files. Use app/utils/db.py (execute_query, execute_insert, execute_update, transaction)"
    models: "app/models/{entity}.py contain all DB logic"
    api_structure: "Blueprint-based. /api/call-center, /api/service, /api/stock, /api/hub, /api/bosta, /api/erp"
    async_pattern: "async/await everywhere. No .then(). Error handling via try/catch."
    
  frontend:
    state_management: "Context API (AuthContext, ThemeContext, CallSessionContext). Local state via useState. No Redux. No Zustand."
    error_feedback: "toast.error() / toast.success() from react-hot-toast. Never alert()."
    component_structure: "front/src/components/{domain}/ — call-center, service, stock, hub, modals, ui, layout, forms, filters"
    pages: "front/src/pages/ — one page = one route. Never nest deeper than one level."
    modals: "Reusable, live in components/modals/"
    naming: "PascalCase for components (ServiceModalViewer.jsx, CallSessionPage.jsx)"
    
  design_system:
    tokens: "front/src/styles/design-tokens.css = source of truth"
    colors: "CSS variables (--color-brand-red-600, --shadow-md). TailwindCSS extends these."
    never: "Never hardcode colors. Use tokens or Tailwind classes."
    genome: "focus:ring-brand-red-500 focus:border-brand-blue-500 (not blue-500)"
    
  architecture:
    two_paths:
      path_a: "ERP → Orders with service_type='sell' pre-set → Bosta auto-enrich → Queue"
      path_b: "Direct/Inbound → call_type='ask' default → Agent reclassifies → Draft → Leader"
    convergence: "Both paths → status=confirmed → Leader queue → Ticket creation"
    
    state_machines:
      replacement: "PENDING → CONFIRMED → IN_PROCESS → READY_FOR_DISPATCH → SENT → RETURNED → COMPLETED"
      maintenance: "PENDING → CONFIRMED → IN_PROCESS (internal: start/complete) → READY_FOR_DISPATCH → SENT → COMPLETED"
      return: "PENDING → CONFIRMED → IN_PROCESS → COMPLETED"
      sell: "PENDING → CONFIRMED → IN_PROCESS → READY_FOR_DISPATCH → SENT → COMPLETED"
      
    stock_physics:
      reserve: "At confirm (R/S for all items, Sell for parts only)"
      commit: "At scan_outbound (reserved → on_hand decreases)"
      receive: "At validate_items (on_hand or damaged increases)"
      maintenance: "NO reservation. Manual stock ops in complete_maintenance."
      
  data_flow:
    phone_format: "Canonical: 01XXXXXXXXX. normalize_phone_safe() before storage."
    tracking_uniqueness: "original_tracking: one-time use (unless CANCELLED). new_tracking_send/receive: can be assigned later."
    bosta_cache: "bosta_orders table → API fallback → force_sync=true to bypass"
    customer_360: "Customer data inferred from orders (Bosta) + tickets (internal) + calls"
    
  invisible_architecture:
    confirmation_snapshot: "Order stores agent-collected data. Leader approval materializes it into ticket."
    backlog_roll: "Old open orders roll into today only when today is viewed. Fragile trigger."
    lock_gap: "lockOrder/unlockOrder = in-memory mock. Two agents can work same order. No conflict detection."
    services_gap: "getOrderCallContext returns services:[] — customer tickets not fetched."
    erp_dedup_gap: "Sync can create duplicate orders. No unique index on erp_order_id yet."
    
  docs_structure:
    master: "docs/INDEX.md = brain map"
    canonical: "docs/call-center/, docs/hub/, docs/system/, docs/design/"
    historical: "dev/ = source material, not authoritative"
    conflict_resolution: "When docs/ vs dev/ conflict, trust docs/"
