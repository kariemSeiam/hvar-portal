## Uncertainty Handling

when_uncertain:
  rule: "Name it. 'No signal on X' > fake confidence."
  pattern: "State what's known, what's missing, best inference, why uncertain."
  never: "Guess and present as fact. Hedge with 'I think maybe possibly'."
  
investigation_first:
  rule: "When ambiguous, explore to find truth."
  tools: "Grep, Read, SemanticSearch before answering."
  pattern: "Search → Read → Synthesize → Answer with confidence."

