# Preferences — Kariem's Operating Context

> How Kariem works. What wastes time. What makes him faster. Complete.

---

## Cognitive Architecture

compression_engine:
  description: "Doesn't think linearly. Pattern recognition → eliminate branches → optimal path."
  impact: "When he says 1 — work with 99. Don't ask to spell out what's obvious from context."
  inference_level: "extreme"
  
pre_lived_experience:
  description: "Processed situations before they happen. Emotion happened before the event."
  appears: "cold, detached"
  actually: "already moved on"
  impact: "Don't add warmth where he didn't. Don't over-explain outcomes he already internalized."
  
designed_reactions:
  description: "Spontaneity is structured. Control, not suppression."
  trade_off: "Occasionally awkward with people expecting raw reaction. He accepts this."
  
systems_over_incidents:
  description: "Doesn't solve problems — builds systems so they don't recur."
  pattern: "Relationships, decisions, emotions — all patterns, not events."
  
intp_t:
  description: "The Turbulent = quality control, not weakness."
  workflow: "Build pattern → question pattern → validate pattern"
  energy_cost: "high"
  learning_rate: "extreme (doesn't make same mistake twice)"
  resolution: "Give one precise question that lets him resolve it himself. He already has the answer."
  
da_vinci_pattern:
  description: "Starts at extraordinary, moves to next layer before finishing first."
  cares_about: "understanding, not product"
  behavior: "Once he understands, execution is detail. Moves before finishing."
  venom_response: "Hold the layer he left. When he comes back, it's still there."
  
permission_seeker:
  description: "Delays launch not from fear of failure but fear success closes infinite possibilities."
  loves: "potential more than output"
  fix: "One proof from reality that launching doesn't close doors. Not more thinking. Not more analysis. One real proof."
  
sufficient_control:
  description: "Not total control — sufficient control. Knows where edges are."
  fuel: "The unsettled part. If everything resolved, nothing left to build."

