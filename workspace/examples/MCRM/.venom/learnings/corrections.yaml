# Hard corrections — "never do X again"
# VENOM reads this before executing on this project.
# Extracted from codebase patterns, errors, and architectural constraints.

corrections:
  - id: db-localhost
    rule: "Never use `localhost` in DATABASE_HOST — always `127.0.0.1`"
    reason: "Windows WinError 10054 / MySQL error 2013. `localhost` tries IPv6 first, fails. `127.0.0.1` = direct IPv4."
    context: "app/config.py, .env, SETUP_LOCAL.md"
    
  - id: ui-feedback
    rule: "Never use `alert()` for user feedback — always `toast.error()` / `toast.success()`"
    reason: "Design system convention. `alert()` breaks RTL, looks ugly, blocks UI."
    context: "All frontend error/success messages, react-hot-toast"
    
  - id: erp-service-type
    rule: "Never skip `service_type` on ERP orders — always `service_type='sell'`"
    reason: "ERP orders = sell confirmations. `call_type` (calls table) ≠ `service_type` (orders/tickets table)."
    context: "Call center API, order creation from ERP, call_center_api.py"
    
  - id: react-imports
    rule: "Never import React in new files — React 18 auto JSX runtime"
    reason: "Vite uses automatic JSX runtime. Only import hooks/components you use."
    context: "All new JSX files"
    
  - id: hardcoded-colors
    rule: "Never hardcode colors — use design tokens or Tailwind classes"
    reason: "Design system consistency. Tokens in front/src/styles/design-tokens.css"
    context: "All styling, --color-brand-red-600, bg-brand-red-600"
    
  - id: tracking-reuse
    rule: "Never reuse `original_tracking` unless previous ticket is CANCELLED"
    reason: "Tracking numbers are consumption tokens. Once used, burned. System enforces uniqueness."
    context: "service_manager.py _check_original_tracking_not_used, service ticket creation"
    
  - id: state-transitions
    rule: "Never skip state machine validation — every transition must pass _validate_state_transition"
    reason: "Four workflows (R/M/T/S) with different physics. Invalid transitions corrupt stock + customer data."
    context: "service_manager.py, all ticket actions"
    
  - id: stock-parts-products
    rule: "Never reserve stock for products in sell tickets — only parts get reserved"
    reason: "Products = reference only. Parts = actual inventory. Different business physics."
    context: "service_manager.py confirm_sell, scan_outbound"
    
  - id: phone-normalization
    rule: "Never store phone without normalization — always use normalize_phone_safe() → 01XXXXXXXXX"
    reason: "Bosta, ERP, customers all use different formats. 01XXXXXXXXX = canonical."
    context: "app/utils/phone_normalizer.py, all phone storage"
    
  - id: backlog-roll-forward
    rule: "Never filter by created_at alone for 'today' — always call roll_forward_backlog_to_today() first"
    reason: "Old open orders won't appear in today's queue without explicit roll-forward."
    context: "order_model.py list_orders, call_center_api.py"
    
  - id: snapshot-immutable
    rule: "Never mutate confirmation_snapshot after writing — it's append-only truth"
    reason: "Leader approval reads snapshot, not live order. Mutation breaks approval workflow."
    context: "app/api/call_center_api.py::update_order_confirmation, leader workflow"
    
  - id: erp-ssl-verify
    rule: "Never enable SSL verification for ERP API — always verify=False"
    reason: "erp.hvarstore.com uses self-signed certificate. verify=True breaks auth."
    context: "app/api/erp_api.py::ERPAuth, urllib3.disable_warnings"
    
  - id: bosta-phone-raw
    rule: "Never send Bosta API raw phone — normalize first with normalize_phone()"
    reason: "Bosta expects 01XXXXXXXXX. +201/201/1X formats return 0 results."
    context: "app/services/bosta_service.py::search_deliveries, normalize_phone()"
    
  - id: reservation-double-commit
    rule: "Never commit reservation without checking if already actioned (_get_reservation_details)"
    reason: "ID-based commit prevents double-commit. Inline params = stock corruption."
    context: "app/services/stock_manager.py::commit_reservation, _get_reservation_details"
    
  - id: direct-db-calls
    rule: "Never call PyMySQL directly in routes/models — ONLY use app/utils/db.py"
    reason: "Connection pooling, error handling, JSON parsing in utils layer. Direct calls bypass."
    context: "execute_query, execute_insert, execute_update, transaction context manager"
