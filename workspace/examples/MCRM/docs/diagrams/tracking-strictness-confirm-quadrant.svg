<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Tracking strictness at confirm (schematic)</title>
  <desc id="desc">Interactive quadrant chart: hover data points for details. Horizontal axis low to high strictness; vertical optional to required tracking.</desc>
  <style>
    :root {
      --surface: #f4f4f5;
      --surface-elevated: #ffffff;
      --text: #18181b;
      --text-muted: #52525b;
      --text-faint: #71717a;
      --border: #d4d4d8;
      --grid: #e4e4e7;
      --q-tr: rgba(59, 130, 246, 0.08);
      --q-bl: rgba(113, 113, 122, 0.12);
      --q-mixed: rgba(113, 113, 122, 0.05);
      --accent-replacement: #2563eb;
      --accent-replacement-ring: rgba(37, 99, 235, 0.35);
      --cluster-stroke: #71717a;
      --cluster-fill: #e4e4e7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #09090b;
        --surface-elevated: #18181b;
        --text: #fafafa;
        --text-muted: #a1a1aa;
        --text-faint: #71717a;
        --border: #3f3f46;
        --grid: #27272a;
        --q-tr: rgba(96, 165, 250, 0.12);
        --q-bl: rgba(161, 161, 170, 0.1);
        --q-mixed: rgba(63, 63, 70, 0.35);
        --accent-replacement: #60a5fa;
        --accent-replacement-ring: rgba(96, 165, 250, 0.45);
        --cluster-stroke: #a1a1aa;
        --cluster-fill: #3f3f46;
      }
    }
    .label {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: var(--text-muted);
      pointer-events: none;
    }
    .label-strong {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: var(--text);
      font-weight: 600;
      pointer-events: none;
    }
    .title {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: var(--text);
      font-size: 20px;
      font-weight: 600;
      pointer-events: none;
    }
    .axis-end {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: var(--text-muted);
      font-size: 13px;
      pointer-events: none;
    }
    .quadrant-hint {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: var(--text-faint);
      font-size: 11px;
      pointer-events: none;
    }
    .point-label {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: var(--text);
      font-size: 13px;
      pointer-events: none;
    }
    .cluster-caption {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      fill: var(--text-muted);
      font-size: 11px;
      pointer-events: none;
    }
    /* Interactive data points: hover = scale + glow (transform-origin via inner translate) */
    g.interactive {
      cursor: pointer;
    }
    g.interactive:focus {
      outline: none;
    }
    g.interactive .hit {
      fill: transparent;
      stroke: transparent;
      pointer-events: all;
    }
    g.interactive .dot {
      transition: filter 0.2s ease, stroke-width 0.2s ease;
      pointer-events: none;
    }
    g.interactive:hover .dot,
    g.interactive:focus-visible .dot {
      filter: drop-shadow(0 0 10px var(--accent-replacement));
      stroke-width: 4px;
    }
    g.cluster-hit:hover .cluster-dot,
    g.cluster-hit:focus-visible .cluster-dot {
      filter: drop-shadow(0 0 6px var(--text-muted));
      stroke-width: 2px;
    }
    /* Quadrant panels: subtle hover (paper feel) */
    rect.quadrant {
      transition: opacity 0.25s ease;
      pointer-events: all;
      cursor: default;
    }
    rect.quadrant:hover {
      opacity: 0.92;
    }
  </style>
  <rect width="900" height="640" fill="var(--surface)"/>
  <g id="chart">
    <rect class="quadrant" x="450" y="100" width="330" height="200" fill="var(--q-tr)" stroke="none">
      <title>Upper right: higher strictness. Replacement ? API requires new_tracking_send on confirm.</title>
    </rect>
    <rect class="quadrant" x="120" y="300" width="330" height="200" fill="var(--q-bl)" stroke="none">
      <title>Lower left: local-first flows. Maintenance, Return, Sell ? tracking optional at confirm on server.</title>
    </rect>
    <rect class="quadrant" x="120" y="100" width="330" height="200" fill="var(--q-mixed)" stroke="none">
      <title>Mixed zone</title>
    </rect>
    <rect class="quadrant" x="450" y="300" width="330" height="200" fill="var(--q-mixed)" stroke="none">
      <title>Mixed zone</title>
    </rect>
    <rect x="120" y="100" width="660" height="400" fill="var(--surface-elevated)" stroke="var(--border)" stroke-width="1.5" pointer-events="none"/>
    <line x1="450" y1="100" x2="450" y2="500" stroke="var(--grid)" stroke-width="1" pointer-events="none"/>
    <line x1="120" y1="300" x2="780" y2="300" stroke="var(--grid)" stroke-width="1" pointer-events="none"/>
    <defs>
      <marker id="arrow-axis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--text-muted)"/>
      </marker>
    </defs>
    <line x1="120" y1="500" x2="775" y2="500" stroke="var(--text-muted)" stroke-width="1.5" marker-end="url(#arrow-axis)" pointer-events="none"/>
    <line x1="120" y1="500" x2="120" y2="105" stroke="var(--text-muted)" stroke-width="1.5" marker-end="url(#arrow-axis)" pointer-events="none"/>
    <text x="450" y="535" text-anchor="middle" class="axis-end">Strictness &#8594;</text>
    <text x="450" y="555" text-anchor="middle" class="label" font-size="12px">Low strictness</text>
    <text x="120" y="555" text-anchor="start" class="label" font-size="12px">&#8592;</text>
    <text x="780" y="555" text-anchor="end" class="label" font-size="12px">High strictness</text>
    <text x="95" y="305" text-anchor="middle" class="axis-end" transform="rotate(-90 95 305)">Tracking &#8594;</text>
    <text x="72" y="500" text-anchor="middle" class="label" font-size="12px" transform="rotate(-90 72 500)">Optional</text>
    <text x="72" y="100" text-anchor="middle" class="label" font-size="12px" transform="rotate(-90 72 100)">Required</text>
    <text x="615" y="145" text-anchor="middle" class="quadrant-hint" font-style="italic">Strict API / send required</text>
    <text x="285" y="445" text-anchor="middle" class="quadrant-hint" font-style="italic">Local-first / optional tracking</text>
    <text x="285" y="130" text-anchor="middle" class="quadrant-hint">mixed</text>
    <text x="615" y="445" text-anchor="middle" class="quadrant-hint">mixed</text>

    <!-- Replacement: animated halo (SMIL, no JS) + hover group -->
    <g class="interactive" transform="translate(701,148)" tabindex="0" focusable="true">
      <title>Replacement ? API returns 400 if new_tracking_send is missing on confirm. Optional: mirror same value to receive in UI.</title>
      <circle r="22" class="hit" aria-hidden="true"/>
      <circle r="20" fill="none" stroke="var(--accent-replacement)" stroke-width="1" opacity="0.35" pointer-events="none">
        <animate attributeName="r" values="14;22;14" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle class="dot" r="11" fill="var(--accent-replacement)" stroke="var(--accent-replacement-ring)" stroke-width="3"/>
      <text y="-20" text-anchor="middle" class="point-label">Replacement</text>
    </g>

    <!-- M / R / S cluster: one hover target + small dots -->
    <g class="interactive cluster-hit" transform="translate(268,420)" tabindex="0" focusable="true">
      <title>Maintenance, Return, Sell ? server does not require new tracking at confirm; columns stay empty until logistics exist.</title>
      <ellipse rx="72" ry="36" class="hit" aria-hidden="true"/>
      <text y="-38" text-anchor="middle" class="cluster-caption">Maintenance &#183; Return &#183; Sell</text>
      <g transform="translate(0,-8)">
        <circle class="cluster-dot" cx="-24" cy="8" r="7" fill="var(--cluster-fill)" stroke="var(--cluster-stroke)" stroke-width="1.25"/>
        <text x="-24" y="11" text-anchor="middle" class="label-strong" font-size="10px">M</text>
        <circle class="cluster-dot" cx="0" cy="8" r="7" fill="var(--cluster-fill)" stroke="var(--cluster-stroke)" stroke-width="1.25"/>
        <text x="0" y="11" text-anchor="middle" class="label-strong" font-size="10px">R</text>
        <circle class="cluster-dot" cx="24" cy="8" r="7" fill="var(--cluster-fill)" stroke="var(--cluster-stroke)" stroke-width="1.25"/>
        <text x="24" y="11" text-anchor="middle" class="label-strong" font-size="10px">S</text>
      </g>
    </g>
  </g>
  <text x="450" y="42" text-anchor="middle" class="title">Tracking strictness at confirm (schematic)</text>
  <text x="450" y="610" text-anchor="middle" class="label" font-size="11px" fill="var(--text-faint)">Hover points &amp; quadrants for notes &#183; No JavaScript required</text>
</svg>
