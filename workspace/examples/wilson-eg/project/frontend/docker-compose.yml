services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wilson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ../..
      dockerfile: project/frontend/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///wilson.db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-key-change-in-production}
      - CORS_ORIGINS=http://localhost:3001,http://localhost:5173
    volumes:
      # Mount source code for hot reload in development
      - ../../project/backend/app.py:/app/app.py:ro
      # Persist database and uploads
      - wilson-data:/app/data
      - wilson-uploads:/app/uploads
    networks:
      - wilson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  wilson-network:
    driver: bridge

volumes:
  wilson-data:
    driver: local
  wilson-uploads:
    driver: local
