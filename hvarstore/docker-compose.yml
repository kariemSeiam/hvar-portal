services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hvar

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "4321:4321"
    env_file: .env
    depends_on:
      - api
    networks:
      - hvar

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    networks:
      - hvar

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: hvar_site
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hvar

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  hvar:
    driver: bridge
